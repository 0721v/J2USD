  <script>
    const API_BASE_URL = '/api';
    let currentPage = 1;
    let categories = [];

    // ========== Toast 提示 ==========
    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
      const icons = {
        success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>',
        error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>',
        info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>',
        warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>'
      };
      
      const toast = document.createElement('div');
      toast.className = `flex items-center gap-3 px-5 py-3 rounded-lg text-white shadow-lg ${colors[type] || colors.info} transform translate-x-full transition-transform duration-300`;
      toast.innerHTML = `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icons[type] || icons.info}</svg><span class="text-sm font-medium">${message}</span>`;
      
      container.appendChild(toast);
      requestAnimationFrame(() => { toast.classList.remove('translate-x-full'); toast.classList.add('translate-x-0'); });
      setTimeout(() => { toast.classList.remove('translate-x-0'); toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ========== 登录检查 ==========
    // checkAdminAuth 已在 DOMContentLoaded 中调用

    // ========== 加载分类 ==========
    async function loadCategories() {
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/categories`);
        const data = await response.json();
        
        if (data.code === 200) {
          categories = data.data.categories || [];
          renderCategoryOptions();
          renderCategoryList();
        }
      } catch (error) {
        console.error('加载分类失败:', error);
      }
    }

    function renderCategoryOptions() {
      const filterSelect = document.getElementById('filterCategory');
      const productSelect = document.getElementById('productCategory');
      
      let options = '<option value="">全部分类</option>';
      let productOptions = '<option value="">请选择分类</option>';
      
      categories.forEach(cat => {
        options += `<option value="${cat.id}">${cat.nameZh || cat.name}</option>`;
        productOptions += `<option value="${cat.id}">${cat.nameZh || cat.name}</option>`;
      });
      
      filterSelect.innerHTML = options;
      productSelect.innerHTML = productOptions;
    }

    function renderCategoryList() {
      const container = document.getElementById('categoryList');
      
      if (categories.length === 0) {
        container.innerHTML = '<div class="col-span-4 text-center text-gray-400 py-8">暂无分类</div>';
        return;
      }
      
      container.innerHTML = categories.map(cat => {
        // 默认图标 SVG
        const defaultIcon = `<div class="w-10 h-10 bg-gradient-to-br from-blue-400 to-blue-600 rounded-lg flex items-center justify-center text-white shadow-sm">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"></path>
          </svg>
        </div>`;
        
        return `
        <div class="border border-gray-200 rounded-lg p-4 ${cat.status === 0 ? 'opacity-50 bg-gray-50' : 'bg-white'} hover:shadow-md transition-shadow">
          <div class="flex items-start gap-3 mb-3">
            ${cat.iconUrl ? `<img src="${cat.iconUrl}" class="w-10 h-10 rounded-lg object-cover" onerror="this.parentElement.innerHTML='${defaultIcon}'">` : defaultIcon}
            <div class="flex-1 min-w-0">
              <div class="font-medium text-gray-800 truncate" title="${cat.nameZh || ''}">${cat.nameZh || '未命名'}</div>
              <div class="text-xs text-gray-500 mt-1 flex flex-wrap gap-x-3 gap-y-1">
                <span title="English">🇺🇸 ${cat.nameEn || '-'}</span>
                <span title="日本語">🇯🇵 ${cat.nameJa || '-'}</span>
                <span title="한국어">🇰🇷 ${cat.nameKo || '-'}</span>
              </div>
            </div>
          </div>
          <div class="flex items-center justify-between pt-3 border-t border-gray-100">
            <div class="text-xs text-gray-500">
              排序: ${cat.sortOrder || 0}
              ${cat.status === 0 ? '<span class="ml-2 text-orange-500">[已禁用]</span>' : ''}
            </div>
            <div class="flex gap-2">
              <button onclick="editCategory(${cat.id})" class="px-2 py-1 text-xs bg-blue-50 text-blue-600 rounded hover:bg-blue-100 transition">编辑</button>
              <button onclick="toggleCategoryStatus(${cat.id}, ${cat.status === 1 ? 0 : 1})" class="px-2 py-1 text-xs ${cat.status === 1 ? 'bg-orange-50 text-orange-600 hover:bg-orange-100' : 'bg-green-50 text-green-600 hover:bg-green-100'} rounded transition">${cat.status === 1 ? '禁用' : '启用'}</button>
              <button onclick="deleteCategory(${cat.id})" class="px-2 py-1 text-xs bg-red-50 text-red-600 rounded hover:bg-red-100 transition">删除</button>
            </div>
          </div>
        </div>
      `;
      }).join('');
    }

    // ========== 加载商品 ==========
    async function loadProducts(page = 1) {
      currentPage = page;
      const categoryId = document.getElementById('filterCategory').value;
      const status = document.getElementById('filterStatus').value;
      
      try {
        let url = `${API_BASE_URL}/admin/products?page=${page}&size=10`;
        if (categoryId) url += `&categoryId=${categoryId}`;
        if (status) url += `&status=${status}`;
        
        const response = await adminFetch(url);
        const data = await response.json();
        
        if (data.code === 200) {
          renderProducts(data.data.products);
          renderPagination(data.data);
        }
      } catch (error) {
        console.error('加载商品失败:', error);
        showToast('加载商品失败', 'error');
      }
    }

    function renderProducts(products) {
      const tbody = document.getElementById('productList');
      
      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-12 text-center text-gray-400">暂无商品</td></tr>';
        return;
      }
      
      tbody.innerHTML = products.map(p => {
        const category = categories.find(c => c.id === p.categoryId);
        return `
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 text-sm text-gray-500">${p.id}</td>
            <td class="px-6 py-4">
              <div class="flex items-center gap-3">
                ${p.imageUrl ? `<img src="${p.imageUrl}" class="w-10 h-10 rounded object-cover">` : '<div class="w-10 h-10 bg-gray-200 rounded flex items-center justify-center text-gray-400">📦</div>'}
                <div>
                  <div class="font-medium text-gray-800">${p.nameZh || p.name}</div>
                  <div class="text-xs text-gray-500">${p.nameEn || ''}</div>
                </div>
              </div>
            </td>
            <td class="px-6 py-4 text-sm text-gray-600">${category ? (category.nameZh || category.name) : '-'}</td>
            <td class="px-6 py-4 text-sm text-gray-800">
              ${p.originalPrice ? `<span class="line-through text-gray-400 mr-2">${p.originalPrice}</span>` : ''}
              <span class="font-medium">${p.price} ${p.currency}</span>
            </td>
            <td class="px-6 py-4 text-sm text-gray-600">${p.stockQuantity || 0}</td>
            <td class="px-6 py-4">
              <span class="px-2 py-1 text-xs rounded-full ${p.status === 1 ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600'}">${p.status === 1 ? '上架' : '下架'}</span>
            </td>
            <td class="px-6 py-4">
              <div class="flex gap-2">
                <button onclick="editProduct(${p.id})" class="text-blue-500 hover:text-blue-700 text-sm">编辑</button>
                <button onclick="toggleProductStatus(${p.id}, ${p.status === 1 ? 0 : 1})" class="${p.status === 1 ? 'text-orange-500 hover:text-orange-700' : 'text-green-500 hover:text-green-700'} text-sm">${p.status === 1 ? '下架' : '上架'}</button>
                <button onclick="deleteProduct(${p.id})" class="text-red-500 hover:text-red-700 text-sm">删除</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderPagination(data) {
      document.getElementById('paginationInfo').textContent = `共 ${data.total} 条，第 ${data.page}/${data.pages || 1} 页`;
      
      let html = '';
      if (data.page > 1) {
        html += `<button onclick="loadProducts(${data.page - 1})" class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">上一页</button>`;
      }
      if (data.page < data.pages) {
        html += `<button onclick="loadProducts(${data.page + 1})" class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50">下一页</button>`;
      }
      document.getElementById('pagination').innerHTML = html;
    }

    // ========== 商品操作 ==========
    function openProductModal(product = null) {
      document.getElementById('productModalTitle').textContent = product ? '编辑商品' : '添加商品';
      document.getElementById('productId').value = product ? product.id : '';
      document.getElementById('productNameZh').value = product ? (product.nameZh || product.name) : '';
      document.getElementById('productNameEn').value = product ? product.nameEn : '';
      document.getElementById('productNameJa').value = product ? product.nameJa : '';
      document.getElementById('productNameKo').value = product ? product.nameKo : '';
      document.getElementById('productCategory').value = product ? product.categoryId : '';
      document.getElementById('productPrice').value = product ? product.price : '';
      document.getElementById('productOriginalPrice').value = product ? product.originalPrice : '';
      document.getElementById('productCurrency').value = product ? product.currency : 'CNY';
      document.getElementById('productImageUrl').value = product ? product.imageUrl : '';
      document.getElementById('productDescZh').value = product ? product.descriptionZh : '';
      
      document.getElementById('productModal').classList.remove('hidden');
    }

    function closeProductModal() {
      document.getElementById('productModal').classList.add('hidden');
      document.getElementById('productForm').reset();
    }

    document.getElementById('productForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('productId').value;
      const product = {
        nameZh: document.getElementById('productNameZh').value,
        nameEn: document.getElementById('productNameEn').value,
        nameJa: document.getElementById('productNameJa').value,
        nameKo: document.getElementById('productNameKo').value,
        categoryId: parseInt(document.getElementById('productCategory').value),
        price: parseFloat(document.getElementById('productPrice').value),
        originalPrice: parseFloat(document.getElementById('productOriginalPrice').value) || null,
        currency: document.getElementById('productCurrency').value,
        imageUrl: document.getElementById('productImageUrl').value,
        descriptionZh: document.getElementById('productDescZh').value
      };
      
      try {
        const url = id ? `${API_BASE_URL}/admin/products/${id}` : `${API_BASE_URL}/admin/products`;
        const method = id ? 'PUT' : 'POST';
        
        const response = await adminFetch(url, {
          method,
          body: JSON.stringify(product)
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          showToast(id ? '商品更新成功' : '商品添加成功', 'success');
          closeProductModal();
          loadProducts(currentPage);
        } else {
          showToast(data.message || '操作失败', 'error');
        }
      } catch (error) {
        console.error('保存商品失败:', error);
        showToast('网络错误', 'error');
      }
    });

    async function editProduct(id) {
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/products/${id}`);
        const data = await response.json();
        
        if (data.code === 200) {
          openProductModal(data.data);
        }
      } catch (error) {
        console.error('获取商品详情失败:', error);
        showToast('获取商品详情失败', 'error');
      }
    }

    async function toggleProductStatus(id, status) {
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/products/${id}/status`, {
          method: 'PUT',
          body: JSON.stringify({ status })
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          showToast(status === 1 ? '商品已上架' : '商品已下架', 'success');
          loadProducts(currentPage);
        } else {
          showToast(data.message || '操作失败', 'error');
        }
      } catch (error) {
        console.error('更新状态失败:', error);
        showToast('网络错误', 'error');
      }
    }

    async function deleteProduct(id) {
      if (!confirm('确定要删除此商品吗？')) return;
      
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/products/${id}`, {
          method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          showToast('商品已删除', 'success');
          loadProducts(currentPage);
        } else {
          showToast(data.message || '删除失败', 'error');
        }
      } catch (error) {
        console.error('删除商品失败:', error);
        showToast('网络错误', 'error');
      }
    }

    // ========== 分类操作 ==========
    function openCategoryModal(category = null) {
      document.getElementById('categoryModalTitle').textContent = category ? '编辑分类' : '添加分类';
      document.getElementById('categoryId').value = category ? category.id : '';
      document.getElementById('categoryNameZh').value = category ? (category.nameZh || category.name) : '';
      document.getElementById('categoryNameEn').value = category ? category.nameEn : '';
      document.getElementById('categoryNameJa').value = category ? category.nameJa : '';
      document.getElementById('categoryNameKo').value = category ? category.nameKo : '';
      document.getElementById('categoryDescZh').value = category ? category.descriptionZh : '';
      document.getElementById('categoryDescEn').value = category ? category.descriptionEn : '';
      document.getElementById('categoryDescJa').value = category ? category.descriptionJa : '';
      document.getElementById('categoryDescKo').value = category ? category.descriptionKo : '';
      document.getElementById('categorySort').value = category ? (category.sortOrder || 0) : 0;
      document.getElementById('categoryIcon').value = category ? category.iconUrl : '';
      
      // 更新图标预览
      updateIconPreview();
      
      document.getElementById('categoryModal').classList.remove('hidden');
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.add('hidden');
      document.getElementById('categoryForm').reset();
      document.getElementById('iconPreview').classList.add('hidden');
    }

    // 更新图标预览
    function updateIconPreview() {
      const iconUrl = document.getElementById('categoryIcon').value;
      const previewDiv = document.getElementById('iconPreview');
      const previewImg = document.getElementById('iconPreviewImg');
      
      if (iconUrl) {
        previewImg.src = iconUrl;
        previewDiv.classList.remove('hidden');
      } else {
        previewDiv.classList.add('hidden');
      }
    }

    // 监听图标URL变化
    document.getElementById('categoryIcon').addEventListener('input', updateIconPreview);

    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const id = document.getElementById('categoryId').value;
      const category = {
        nameZh: document.getElementById('categoryNameZh').value,
        nameEn: document.getElementById('categoryNameEn').value,
        nameJa: document.getElementById('categoryNameJa').value,
        nameKo: document.getElementById('categoryNameKo').value,
        descriptionZh: document.getElementById('categoryDescZh').value,
        descriptionEn: document.getElementById('categoryDescEn').value,
        descriptionJa: document.getElementById('categoryDescJa').value,
        descriptionKo: document.getElementById('categoryDescKo').value,
        sortOrder: parseInt(document.getElementById('categorySort').value) || 0,
        iconUrl: document.getElementById('categoryIcon').value || null
      };
      
      try {
        const url = id ? `${API_BASE_URL}/admin/categories/${id}` : `${API_BASE_URL}/admin/categories`;
        const method = id ? 'PUT' : 'POST';
        
        const response = await adminFetch(url, {
          method,
          body: JSON.stringify(category)
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          showToast(id ? '分类更新成功' : '分类添加成功', 'success');
          closeCategoryModal();
          loadCategories();
          loadProducts(currentPage);
        } else {
          showToast(data.message || '操作失败', 'error');
        }
      } catch (error) {
        console.error('保存分类失败:', error);
        showToast('网络错误', 'error');
      }
    });

    async function editCategory(id) {
      const category = categories.find(c => c.id === id);
      if (category) {
        openCategoryModal(category);
      }
    }

    // 自动翻译功能（基于简单的词汇映射）
    async function autoTranslate() {
      const zhName = document.getElementById('categoryNameZh').value.trim();
      if (!zhName) {
        showToast('请先输入中文名称', 'warning');
        return;
      }

      const btn = document.querySelector('button[onclick="autoTranslate()"]');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>翻译中...';
      btn.disabled = true;

      try {
        // 使用免费的翻译API（MyMemory）
        const [enRes, jaRes, koRes] = await Promise.all([
          fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(zhName)}&langpair=zh-CN|en`).then(r => r.json()).catch(() => null),
          fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(zhName)}&langpair=zh-CN|ja`).then(r => r.json()).catch(() => null),
          fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(zhName)}&langpair=zh-CN|ko`).then(r => r.json()).catch(() => null)
        ]);

        // 设置翻译结果（如果API失败则使用拼音或原文）
        document.getElementById('categoryNameEn').value = enRes?.responseData?.translatedText || zhName;
        document.getElementById('categoryNameJa').value = jaRes?.responseData?.translatedText || zhName;
        document.getElementById('categoryNameKo').value = koRes?.responseData?.translatedText || zhName;

        showToast('翻译完成', 'success');
      } catch (error) {
        console.error('翻译失败:', error);
        // 如果API失败，使用简单的音译
        document.getElementById('categoryNameEn').value = zhName;
        document.getElementById('categoryNameJa').value = zhName;
        document.getElementById('categoryNameKo').value = zhName;
        showToast('翻译服务暂不可用，已填充原文', 'warning');
      } finally {
        btn.innerHTML = originalHTML;
        btn.disabled = false;
      }
    }

    // 商品名称一键翻译（翻译名称和描述）
    async function autoTranslateProductName() {
      const zhName = document.getElementById('productNameZh').value.trim();
      const zhDesc = document.getElementById('productDescZh').value.trim();
      
      if (!zhName && !zhDesc) {
        showToast('请先输入中文名称或描述', 'warning');
        return;
      }

      const btn = document.querySelector('button[onclick="autoTranslateProductName()"]');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>翻译中...';
      btn.disabled = true;

      try {
        // 翻译名称
        if (zhName) {
          const [enRes, jaRes, koRes] = await Promise.all([
            fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(zhName)}&langpair=zh-CN|en`).then(r => r.json()).catch(() => null),
            fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(zhName)}&langpair=zh-CN|ja`).then(r => r.json()).catch(() => null),
            fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(zhName)}&langpair=zh-CN|ko`).then(r => r.json()).catch(() => null)
          ]);
          document.getElementById('productNameEn').value = enRes?.responseData?.translatedText || zhName;
          document.getElementById('productNameJa').value = jaRes?.responseData?.translatedText || zhName;
          document.getElementById('productNameKo').value = koRes?.responseData?.translatedText || zhName;
        }

        // 翻译描述
        if (zhDesc) {
          const [descEnRes, descJaRes, descKoRes] = await Promise.all([
            fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(zhDesc)}&langpair=zh-CN|en`).then(r => r.json()).catch(() => null),
            fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(zhDesc)}&langpair=zh-CN|ja`).then(r => r.json()).catch(() => null),
            fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(zhDesc)}&langpair=zh-CN|ko`).then(r => r.json()).catch(() => null)
          ]);
          // 商品描述只有中文，英文/日文/韩文描述可以存到对应字段（如果有的话）或者提示用户
        }

        showToast('翻译完成', 'success');
      } catch (error) {
        console.error('翻译失败:', error);
        showToast('翻译服务暂不可用', 'warning');
      } finally {
        btn.innerHTML = originalHTML;
        btn.disabled = false;
      }
    }

    async function toggleCategoryStatus(id, status) {
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/categories/${id}/status`, {
          method: 'PUT',
          body: JSON.stringify({ status })
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          showToast(status === 1 ? '分类已启用' : '分类已禁用', 'success');
          loadCategories();
        } else {
          showToast(data.message || '操作失败', 'error');
        }
      } catch (error) {
        console.error('更新分类状态失败:', error);
        showToast('网络错误', 'error');
      }
    }

    async function deleteCategory(id) {
      if (!confirm('确定要删除此分类吗？分类下有商品时无法删除。')) return;
      
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/categories/${id}`, {
          method: 'DELETE'
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          showToast('分类已删除', 'success');
          loadCategories();
        } else {
          showToast(data.message || '删除失败', 'error');
        }
      } catch (error) {
        console.error('删除分类失败:', error);
        showToast('网络错误', 'error');
      }
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAdminAuth();
      loadCategories();
      loadProducts();
    });
  </script>
</body>
</html>
