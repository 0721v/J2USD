<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 - 管理后台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/common.js"></script>
</head>
<body class="bg-gray-100">
  <!-- Toast 容器 -->
  <div id="toastContainer" class="fixed top-4 right-4 z-[99999] space-y-2"></div>

  <aside class="fixed left-0 top-0 bottom-0 w-64 bg-gray-800 text-white z-50">
    <div class="p-6 border-b border-gray-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <div>
          <h1 class="font-bold text-lg">管理后台</h1>
          <p class="text-xs text-gray-400">Admin Panel</p>
        </div>
      </div>
    </div>

    <nav class="p-4 space-y-2">
      <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"></path>
        </svg>
        仪表盘
      </a>
      <a href="products.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
        </svg>
        商品管理
      </a>
      <a href="cards.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path>
        </svg>
        兑换码管理
      </a>
      <a href="orders.html" class="flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-lg text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"></path>
        </svg>
        订单管理
      </a>
      <a href="payment-settings.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
        </svg>
        支付配置
      </a>
      <a href="settings.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
        </svg>
        系统设置
      </a>
    </nav>
  </aside>

  <main class="ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
      <h2 class="text-xl font-bold text-gray-800">订单管理</h2>
    </header>

    <div class="p-8 space-y-6">
      <!-- 筛选栏 -->
      <div class="bg-white rounded-lg shadow p-4 flex gap-4 items-center flex-wrap">
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-600 whitespace-nowrap">订单号:</label>
          <input type="text" id="filterOrderNo" placeholder="输入订单号搜索" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none w-48">
        </div>
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-600 whitespace-nowrap">订单状态:</label>
          <select id="filterStatus" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">全部</option>
            <option value="0">待支付</option>
            <option value="1">已支付</option>
            <option value="2">已完成</option>
            <option value="3">已取消</option>
            <option value="4">已取消</option>
          </select>
        </div>
        <div class="flex items-center gap-2">
          <label class="text-sm text-gray-600 whitespace-nowrap">支付状态:</label>
          <select id="filterPaymentStatus" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <option value="">全部</option>
            <option value="0">待支付</option>
            <option value="1">已支付</option>
            <option value="2">支付失败</option>
          </select>
        </div>
        <button onclick="loadOrders()" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          搜索
        </button>
        <button onclick="resetFilters()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">重置</button>
      </div>

      <!-- 订单列表 -->
      <div class="bg-white rounded-lg shadow overflow-hidden">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">订单号</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">商品名称</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">数量</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">金额</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">支付方式</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">订单状态</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">支付状态</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">创建时间</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
            </tr>
          </thead>
          <tbody id="orderList" class="divide-y divide-gray-200">
            <!-- 动态加载 -->
          </tbody>
        </table>

        <!-- 分页 -->
        <div class="px-6 py-4 border-t border-gray-200 flex justify-between items-center">
          <span id="paginationInfo" class="text-sm text-gray-500">共 0 条</span>
          <div id="pagination" class="flex gap-2">
            <!-- 动态加载 -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 订单详情弹窗 -->
  <div id="orderDetailModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-lg m-4">
      <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
        <h3 class="text-lg font-bold text-gray-800">订单详情</h3>
        <button onclick="closeOrderDetailModal()" class="text-gray-400 hover:text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <div id="orderDetailContent" class="p-6">
        <!-- 动态加载 -->
      </div>
      <div class="px-6 py-4 border-t border-gray-200 flex justify-end">
        <button onclick="closeOrderDetailModal()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">关闭</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE_URL = '/api';
    let currentPage = 1;

    // ========== Toast 提示 ==========
    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
      const icons = {
        success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>',
        error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>',
        info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>',
        warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>'
      };

      const toast = document.createElement('div');
      toast.className = `flex items-center gap-3 px-5 py-3 rounded-lg text-white shadow-lg ${colors[type] || colors.info} transform translate-x-full transition-transform duration-300`;
      toast.innerHTML = `<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icons[type] || icons.info}</svg><span class="text-sm font-medium">${message}</span>`;

      container.appendChild(toast);
      requestAnimationFrame(() => { toast.classList.remove('translate-x-full'); toast.classList.add('translate-x-0'); });
      setTimeout(() => { toast.classList.remove('translate-x-0'); toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    // ========== 登录检查 ==========
    // checkAdminAuth 已在 DOMContentLoaded 中调用

    // ========== 状态映射 ==========
    const orderStatusMap = {
      0: { label: '待支付', cls: 'bg-yellow-100 text-yellow-700' },
      1: { label: '已支付', cls: 'bg-blue-100 text-blue-700' },
      2: { label: '已完成', cls: 'bg-green-100 text-green-700' },
      3: { label: '已取消', cls: 'bg-gray-100 text-gray-600' },
      4: { label: '已取消', cls: 'bg-gray-100 text-gray-600' }
    };

    const paymentStatusMap = {
      0: { label: '待支付', cls: 'bg-yellow-100 text-yellow-700' },
      1: { label: '已支付', cls: 'bg-green-100 text-green-700' },
      2: { label: '支付失败', cls: 'bg-red-100 text-red-700' }
    };

    const paymentMethodMap = {
      'ALIPAY': '支付宝',
      'WECHAT': '微信支付',
      'PAYPAL': 'PayPal',
      'USDT': 'USDT',
      'CRYPTO': '加密货币',
      'STRIPE': 'Stripe',
      'COINPAYMENTS': 'CoinPayments'
    };

    // ========== 辅助函数 ==========
    function formatDateTime(dateStr) {
      try {
        const date = new Date(dateStr);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const h = String(date.getHours()).padStart(2, '0');
        const min = String(date.getMinutes()).padStart(2, '0');
        const s = String(date.getSeconds()).padStart(2, '0');
        return `${y}-${m}-${d} ${h}:${min}:${s}`;
      } catch (e) {
        return dateStr || '-';
      }
    }

    function getOrderStatusInfo(status) {
      return orderStatusMap[status] || { label: '未知', cls: 'bg-gray-100 text-gray-600' };
    }

    function getPaymentStatusInfo(status) {
      return paymentStatusMap[status] || { label: '未知', cls: 'bg-gray-100 text-gray-600' };
    }

    function getPaymentMethodName(method) {
      return paymentMethodMap[method] || method || '-';
    }

    function getProductName(order) {
      if (order.product) {
        return order.product.nameZh || order.product.nameEn || order.product.name || `商品 #${order.productId}`;
      }
      return `商品 #${order.productId}`;
    }

    // ========== 加载订单列表 ==========
    async function loadOrders(page = 1) {
      currentPage = page;
      const orderNo = document.getElementById('filterOrderNo').value.trim();
      const status = document.getElementById('filterStatus').value;
      const paymentStatus = document.getElementById('filterPaymentStatus').value;

      try {
        let url = `${API_BASE_URL}/admin/orders?page=${page}&size=20`;
        if (orderNo) url += `&orderNo=${encodeURIComponent(orderNo)}`;
        if (status !== '') url += `&status=${status}`;
        if (paymentStatus !== '') url += `&paymentStatus=${paymentStatus}`;

        const response = await adminFetch(url);
        const data = await response.json();

        if (data.code === 200) {
          const orders = data.data.orders || data.data.items || data.data.content || data.data || [];
          renderOrders(orders);
          renderPagination(data.data);
        } else {
          showToast(data.message || '加载订单失败', 'error');
        }
      } catch (error) {
        console.error('加载订单失败:', error);
        showToast('加载订单失败', 'error');
      }
    }

    function renderOrders(orders) {
      const tbody = document.getElementById('orderList');

      if (!orders || orders.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="px-6 py-12 text-center text-gray-400">暂无订单数据</td></tr>';
        return;
      }

      tbody.innerHTML = orders.map(order => {
        const orderStatusInfo = getOrderStatusInfo(order.status);
        const paymentStatusInfo = getPaymentStatusInfo(order.paymentStatus);
        const productName = getProductName(order);
        const createdAt = order.createdAt ? formatDateTime(order.createdAt) : '-';

        return `
          <tr class="hover:bg-gray-50">
            <td class="px-6 py-4 text-sm text-gray-800 font-mono">${order.orderNo || '-'}</td>
            <td class="px-6 py-4 text-sm text-gray-800">${productName}</td>
            <td class="px-6 py-4 text-sm text-gray-600">${order.quantity || 0}</td>
            <td class="px-6 py-4 text-sm text-gray-800 font-medium">${order.totalAmount || 0} ${order.currency || ''}</td>
            <td class="px-6 py-4 text-sm text-gray-600">${getPaymentMethodName(order.paymentMethod)}</td>
            <td class="px-6 py-4">
              <span class="px-2 py-1 text-xs rounded-full ${orderStatusInfo.cls}">${orderStatusInfo.label}</span>
            </td>
            <td class="px-6 py-4">
              <span class="px-2 py-1 text-xs rounded-full ${paymentStatusInfo.cls}">${paymentStatusInfo.label}</span>
            </td>
            <td class="px-6 py-4 text-sm text-gray-500">${createdAt}</td>
            <td class="px-6 py-4">
              <div class="flex gap-3">
                <button onclick="viewOrderDetail(${order.id})" class="text-blue-500 hover:text-blue-700 text-sm">查看详情</button>
                <button onclick="deleteOrder(${order.id})" class="text-red-500 hover:text-red-700 text-sm">删除</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderPagination(data) {
      const total = data.total || data.totalElements || 0;
      const page = data.page || data.number + 1 || 1;
      const pages = data.pages || data.totalPages || 1;

      document.getElementById('paginationInfo').textContent = `共 ${total} 条，第 ${page}/${pages} 页`;

      let html = '';
      if (page > 1) {
        html += `<button onclick="loadOrders(${page - 1})" class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 text-sm">上一页</button>`;
      }

      // 显示页码
      let startPage = Math.max(1, page - 2);
      let endPage = Math.min(pages, page + 2);
      if (endPage - startPage < 4) {
        if (startPage === 1) {
          endPage = Math.min(pages, startPage + 4);
        } else {
          startPage = Math.max(1, endPage - 4);
        }
      }

      for (let i = startPage; i <= endPage; i++) {
        if (i === page) {
          html += `<button class="px-3 py-1 bg-blue-500 text-white rounded text-sm">${i}</button>`;
        } else {
          html += `<button onclick="loadOrders(${i})" class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 text-sm">${i}</button>`;
        }
      }

      if (page < pages) {
        html += `<button onclick="loadOrders(${page + 1})" class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 text-sm">下一页</button>`;
      }
      document.getElementById('pagination').innerHTML = html;
    }

    // ========== 重置筛选 ==========
    function resetFilters() {
      document.getElementById('filterOrderNo').value = '';
      document.getElementById('filterStatus').value = '';
      document.getElementById('filterPaymentStatus').value = '';
      loadOrders(1);
    }

    // ========== 查看订单详情 ==========
    async function viewOrderDetail(id) {
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/orders/${id}`);
        const data = await response.json();

        if (data.code === 200) {
          renderOrderDetail(data.data);
          document.getElementById('orderDetailModal').classList.remove('hidden');
        } else {
          showToast(data.message || '获取订单详情失败', 'error');
        }
      } catch (error) {
        console.error('获取订单详情失败:', error);
        showToast('获取订单详情失败', 'error');
      }
    }

    function renderOrderDetail(order) {
      const orderStatusInfo = getOrderStatusInfo(order.status);
      const paymentStatusInfo = getPaymentStatusInfo(order.paymentStatus);
      const productName = getProductName(order);

      const fields = [
        { label: '订单号', value: order.orderNo || '-' },
        { label: '商品名称', value: productName },
        { label: '数量', value: order.quantity || 0 },
        { label: '总金额', value: `${order.totalAmount || 0} ${order.currency || ''}` },
        { label: '币种', value: order.currency || '-' },
        { label: '支付方式', value: getPaymentMethodName(order.paymentMethod) },
        { label: '订单状态', value: `<span class="px-2 py-1 text-xs rounded-full ${orderStatusInfo.cls}">${orderStatusInfo.label}</span>`, isHtml: true },
        { label: '支付状态', value: `<span class="px-2 py-1 text-xs rounded-full ${paymentStatusInfo.cls}">${paymentStatusInfo.label}</span>`, isHtml: true },
        { label: '支付时间', value: order.paymentTime ? formatDateTime(order.paymentTime) : '-' },
        { label: '支付交易号', value: order.paymentTrxId || '-' },
        { label: '客户邮箱', value: order.customerEmail || '-' },
        { label: '客户电话', value: order.customerPhone || '-' },
        { label: '客户IP', value: order.ipAddress || '-' },
        { label: '创建时间', value: order.createdAt ? formatDateTime(order.createdAt) : '-' }
      ];

      const html = `
        <div class="space-y-3">
          ${fields.map(f => `
            <div class="flex justify-between items-start py-2 border-b border-gray-100 last:border-0">
              <span class="text-sm text-gray-500 flex-shrink-0 w-24">${f.label}</span>
              <span class="text-sm text-gray-800 text-right flex-1 ml-4 ${f.isHtml ? '' : 'font-mono'}">${f.isHtml ? f.value : (f.value || '-')}</span>
            </div>
          `).join('')}
        </div>
      `;

      document.getElementById('orderDetailContent').innerHTML = html;
    }

    function closeOrderDetailModal() {
      document.getElementById('orderDetailModal').classList.add('hidden');
    }

    // ========== 删除订单 ==========
    async function deleteOrder(id) {
      if (!confirm('确定要删除此订单吗？删除后不可恢复。')) return;

      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/orders/${id}`, {
          method: 'DELETE'
        });

        const data = await response.json();

        if (data.code === 200) {
          showToast('订单已删除', 'success');
          loadOrders(currentPage);
        } else {
          showToast(data.message || '删除失败', 'error');
        }
      } catch (error) {
        console.error('删除订单失败:', error);
        showToast('网络错误', 'error');
      }
    }

    // 点击弹窗背景关闭
    document.getElementById('orderDetailModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        closeOrderDetailModal();
      }
    });

    // 回车搜索
    document.getElementById('filterOrderNo').addEventListener('keyup', (e) => {
      if (e.key === 'Enter') {
        loadOrders(1);
      }
    });

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAdminAuth();
      loadOrders();
    });
  </script>
</body>
</html>
