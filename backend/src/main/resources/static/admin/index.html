  <script>
    // ========== Toast 提示 ==========
    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      if (!container) return;
      const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
      const icons = {
        success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>',
        error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>',
        info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>',
        warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>'
      };
      const toast = document.createElement('div');
      toast.className = `flex items-center gap-3 px-5 py-3 rounded-lg text-white shadow-lg ${colors[type] || colors.info} transform translate-x-full transition-transform duration-300`;
      toast.innerHTML = '<svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">' + (icons[type] || icons.info) + '</svg><span class="text-sm font-medium">' + message + '</span>';
      container.appendChild(toast);
      requestAnimationFrame(() => { toast.classList.remove('translate-x-full'); toast.classList.add('translate-x-0'); });
      setTimeout(() => { toast.classList.remove('translate-x-0'); toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 3000);
    }

    const API_BASE_URL = '/api';

    // 加载管理员信息
    function loadAdminInfo() {
      const adminUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
      if (adminUser.username) {
        document.getElementById('adminUsername').textContent = adminUser.username;
      }
    }

    // 加载统计数据
    async function loadStatistics() {
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/statistics`);
        const data = await response.json();
        
        if (data.code === 200) {
          document.getElementById('todayOrders').textContent = data.data.todayOrders || 0;
          document.getElementById('todaySales').textContent = '¥' + (data.data.todaySales || 0).toFixed(2);
          document.getElementById('pendingOrders').textContent = data.data.pendingOrders || 0;
          document.getElementById('totalCards').textContent = data.data.totalCards || 0;
        }
      } catch (error) {
        console.error('加载统计数据失败:', error);
      }
    }
    
    // 加载支付状态
    async function loadPaymentStatus() {
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/payment-config/status`);
        const data = await response.json();
        
        if (data.code === 200) {
          updateStatusIndicator('wechatStatus', data.data.wechat);
          updateStatusIndicator('alipayStatus', data.data.alipay);
          updateStatusIndicator('trc20Status', data.data.trc20);
        }
      } catch (error) {
        console.error('加载支付状态失败:', error);
      }
    }

    function updateStatusIndicator(id, enabled) {
      const el = document.getElementById(id);
      if (enabled) {
        el.className = 'w-3 h-3 rounded-full bg-green-500';
      } else {
        el.className = 'w-3 h-3 rounded-full bg-gray-300';
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAdminAuth();
      loadAdminInfo();
      loadStatistics();
      loadPaymentStatus();
    });
  </script>
