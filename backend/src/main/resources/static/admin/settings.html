<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兰雀Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/js/common.js"></script>
</head>
<body class="bg-gray-100">
  <!-- Toast 容器 -->
  <div id="toastContainer" class="fixed top-4 right-4 z-[99999] space-y-2"></div>

  <aside class="fixed left-0 top-0 bottom-0 w-64 bg-gray-800 text-white z-50">
    <div class="p-6 border-b border-gray-700">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-blue-500 rounded-lg flex items-center justify-center">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>
        <div>
          <h1 class="font-bold text-lg">管理后台</h1>
          <p class="text-xs text-gray-400">Admin Panel</p>
        </div>
      </div>
    </div>

    <nav class="p-4 space-y-2">
      <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2"></path>
        </svg>
        仪表盘
      </a>
      <a href="products.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
        </svg>
        商品管理
      </a>
      <a href="cards.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path>
        </svg>
        兑换码管理
      </a>
      <a href="orders.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"></path>
        </svg>
        订单管理
      </a>
      <a href="payment-settings.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-700 rounded-lg transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
        </svg>
        支付配置
      </a>
      <a href="settings.html" class="flex items-center gap-3 px-4 py-3 bg-blue-600 rounded-lg text-white">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
        </svg>
        系统设置
      </a>
    </nav>
  </aside>

  <main class="ml-64">
    <header class="bg-white shadow-sm px-8 py-4">
      <h2 class="text-xl font-bold text-gray-800">系统设置</h2>
    </header>

    <div class="p-8 space-y-6">
      <!-- 常规设置 -->
      <div class="bg-white rounded-lg shadow p-6">
        <div class="mb-6">
          <h3 class="text-lg font-medium text-gray-700">常规设置</h3>
          <p class="text-sm text-gray-500 mt-1">配置网站基本信息</p>
        </div>
        
        <form id="settingsForm" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">网站名称</label>
            <input type="text" id="siteName" name="site_name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="请输入网站名称" />
            <p class="text-xs text-gray-400 mt-1">将同步显示在前台所有页面</p>
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">网站 Logo</label>
            <input type="hidden" id="siteLogo" name="site_logo" />
            <div class="flex items-start gap-4">
              <div class="flex-1">
                <div id="logoUploadArea" class="border-2 border-dashed border-gray-300 rounded-lg p-4 text-center hover:border-blue-500 transition cursor-pointer">
                  <input type="file" id="logoFile" accept="image/jpeg,image/png,image/webp" class="hidden" onchange="handleLogoUpload(this)" />
                  <svg class="w-8 h-8 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                  </svg>
                  <p class="text-sm text-gray-500">点击上传 Logo</p>
                </div>
                <p class="text-xs text-gray-400 mt-1">支持 JPG、PNG、WebP 格式，最大5MB</p>
              </div>
              <div id="logoPreview" class="w-16 h-16 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50 flex-shrink-0 overflow-hidden">
                <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
              </div>
            </div>
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">默认语言</label>
            <select id="defaultLang" name="default_lang" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
              <option value="zh">中文</option>
              <option value="en">English</option>
              <option value="ja">日本語</option>
              <option value="ko">한국어</option>
            </select>
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">订单过期时间（分钟）</label>
            <input type="number" id="orderExpire" name="order_expire" min="5" max="1440" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="30" />
          </div>
          
          <div class="pt-4">
            <button type="submit" id="saveBtn" class="px-6 py-2.5 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition flex items-center gap-2 font-medium">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
              </svg>
              <span>保存设置</span>
            </button>
          </div>
        </form>
      </div>
      
      <!-- 修改密码 -->
      <div class="bg-white rounded-lg shadow p-6">
        <div class="mb-6">
          <h3 class="text-lg font-medium text-gray-700">修改密码</h3>
          <p class="text-sm text-gray-500 mt-1">修改管理员账户密码</p>
        </div>
        
        <form id="passwordForm" class="space-y-5 max-w-md">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">当前密码</label>
            <input type="password" id="currentPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="请输入当前密码" required />
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">新密码</label>
            <input type="password" id="newPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="请输入新密码（至少6位）" required minlength="6" />
            <p class="text-xs text-gray-400 mt-1">新密码长度至少为6个字符</p>
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">确认新密码</label>
            <input type="password" id="confirmPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="请再次输入新密码" required />
          </div>
          
          <div class="pt-4">
            <button type="submit" id="changePasswordBtn" class="px-6 py-2.5 bg-green-500 text-white rounded-lg hover:bg-green-600 transition flex items-center gap-2 font-medium">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
              </svg>
              <span>修改密码</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    const API_BASE_URL = '/api';
    
    // ========== Toast 提示 ==========
    function showToast(message, type) {
      const container = document.getElementById('toastContainer');
      const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        info: 'bg-blue-500',
        warning: 'bg-yellow-500'
      };
      const icons = {
        success: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>',
        error: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>',
        info: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>',
        warning: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>'
      };
      
      const toast = document.createElement('div');
      toast.className = `flex items-center gap-3 px-5 py-3 rounded-lg text-white shadow-lg ${colors[type] || colors.info} transform translate-x-full transition-transform duration-300`;
      toast.innerHTML = `
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">${icons[type] || icons.info}</svg>
        <span class="text-sm font-medium">${message}</span>
      `;
      
      container.appendChild(toast);
      
      // 滑入动画
      requestAnimationFrame(() => {
        toast.classList.remove('translate-x-full');
        toast.classList.add('translate-x-0');
      });
      
      // 3秒后滑出并移除
      setTimeout(() => {
        toast.classList.remove('translate-x-0');
        toast.classList.add('translate-x-full');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }
    
    // ========== 登录检查 ==========
    // checkAdminAuth 已在 DOMContentLoaded 中调用
    
    // ========== Logo 上传点击事件 ==========
    document.getElementById('logoUploadArea').addEventListener('click', () => {
      document.getElementById('logoFile').click();
    });

    // ========== Logo 上传处理 ==========
    async function handleLogoUpload(input) {
      const file = input.files[0];
      if (!file) return;

      const uploadArea = document.getElementById('logoUploadArea');
      const preview = document.getElementById('logoPreview');

      uploadArea.innerHTML = '<div class="flex items-center justify-center gap-2"><svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span class="text-blue-500 text-sm">上传中...</span></div>';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const response = await adminFetch(`${API_BASE_URL}/upload/image`, {
          method: 'POST',
          body: formData
        });

        console.log('上传响应状态:', response.status, response.statusText);

        const data = await response.json();
        console.log('上传响应数据:', data);

        if (data.code === 200) {
          document.getElementById('siteLogo').value = data.data.url;
          preview.innerHTML = `<img src="${data.data.url}" alt="Logo预览" class="w-full h-full object-contain" />`;
          uploadArea.innerHTML = '<svg class="w-8 h-8 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><p class="text-sm text-gray-500">点击上传 Logo</p>';
        } else {
          showToast(data.message || '上传失败', 'error');
          uploadArea.innerHTML = '<svg class="w-8 h-8 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><p class="text-sm text-gray-500">点击上传 Logo</p>';
        }
      } catch (error) {
        console.error('上传失败:', error);
        showToast('上传失败，请重试: ' + error.message, 'error');
        uploadArea.innerHTML = '<svg class="w-8 h-8 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg><p class="text-sm text-gray-500">点击上传 Logo</p>';
      }
    }
    
    // ========== 加载设置 ==========
    async function loadSettings() {
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/settings`);
        const data = await response.json();
        console.log('Settings API response:', data);
        
        if (data.code === 200) {
          const s = data.data;
          console.log('Settings data:', s);
          
          const siteNameEl = document.getElementById('siteName');
          const siteLogoEl = document.getElementById('siteLogo');
          const defaultLangEl = document.getElementById('defaultLang');
          const orderExpireEl = document.getElementById('orderExpire');
          
          console.log('Elements:', { siteNameEl, siteLogoEl, defaultLangEl, orderExpireEl });
          
          if (siteNameEl) siteNameEl.value = s.site_name || '';
          if (siteLogoEl) siteLogoEl.value = s.site_logo || '';
          if (defaultLangEl) defaultLangEl.value = s.default_lang || 'zh';
          if (orderExpireEl) orderExpireEl.value = s.order_expire || 30;
          
          // 显示 logo 预览
          if (s.site_logo) {
            const preview = document.getElementById('logoPreview');
            if (preview) {
              preview.innerHTML = `<img src="${s.site_logo}" alt="Logo预览" class="w-full h-full object-contain" />`;
            }
          }
        }
      } catch (error) {
        console.error('加载设置失败:', error);
        showToast('加载设置失败', 'error');
      }
    }
    
    // ========== 保存设置 ==========
    async function saveSettings(formData) {
      const settings = {};
      formData.forEach((value, key) => { settings[key] = value; });
      
      const btn = document.getElementById('saveBtn');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span>保存中...</span>';
      btn.disabled = true;
      
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/settings`, {
          method: 'PUT',
          body: JSON.stringify(settings)
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          showToast('设置保存成功！', 'success');
          // 清除前端缓存，让前台页面下次加载时获取最新设置
          localStorage.removeItem('site_settings');
        } else {
          showToast(data.message || '保存失败', 'error');
        }
      } catch (error) {
        console.error('保存设置失败:', error);
        showToast('网络错误，保存失败', 'error');
      } finally {
        btn.innerHTML = originalHTML;
        btn.disabled = false;
      }
    }
    
    // ========== 表单提交 ==========
    document.getElementById('settingsForm').addEventListener('submit', (e) => {
      e.preventDefault();
      saveSettings(new FormData(e.target));
    });
    
    // ========== 修改密码 ==========
    document.getElementById('passwordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const currentPassword = document.getElementById('currentPassword').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (!currentPassword) {
        showToast('请输入当前密码', 'error');
        return;
      }
      
      if (!newPassword) {
        showToast('请输入新密码', 'error');
        return;
      }
      
      if (newPassword.length < 6) {
        showToast('新密码长度至少为6个字符', 'error');
        return;
      }
      
      if (newPassword !== confirmPassword) {
        showToast('两次输入的新密码不一致', 'error');
        return;
      }
      
      const btn = document.getElementById('changePasswordBtn');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg><span>处理中...</span>';
      btn.disabled = true;
      
      try {
        const response = await adminFetch(`${API_BASE_URL}/admin/change-password`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            currentPassword: currentPassword,
            newPassword: newPassword
          })
        });
        
        const data = await response.json();
        
        if (data.code === 200) {
          showToast('密码修改成功！', 'success');
          document.getElementById('passwordForm').reset();
        } else {
          showToast(data.message || '密码修改失败', 'error');
        }
      } catch (error) {
        console.error('修改密码失败:', error);
        showToast('网络错误，修改密码失败', 'error');
      } finally {
        btn.innerHTML = originalHTML;
        btn.disabled = false;
      }
    });
    
    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', async () => {
      await checkAdminAuth();
      loadSettings();
    });
  </script>
</body>
</html>
