<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>兰雀Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/common.css">
  <style>
    /* 页面切换动画 */
    #content-area {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #content-area.loaded {
      opacity: 1;
      transform: translateY(0);
    }
    /* 加载指示器 */
    .loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      transform: translateX(-100%);
      z-index: 9999;
    }
    .loading-bar.active {
      animation: loading 1s ease-in-out infinite;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(0%); }
      100% { transform: translateX(100%); }
    }
  </style>
</head>
<body class="bg-gray-50">
  <!-- 加载条 -->
  <div id="loadingBar" class="loading-bar"></div>

  <!-- 顶部导航栏 -->
  <nav id="navbar" class="fixed top-0 left-0 right-0 bg-white z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
      <!-- Logo 区域（左侧） -->
      <div class="flex items-center gap-2 cursor-pointer" onclick="router.navigate('index')">
        <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
        <div class="site-logo-container hidden"></div>
        <span class="text-lg font-bold text-blue-500 site-name">礼品卡平台</span>
      </div>

      <!-- 导航链接（中间） -->
      <div class="hidden md:flex items-center gap-6">
        <a href="#" id="nav-home" class="nav-link text-blue-500 font-medium" data-page="index">首页</a>
        <a href="#" id="nav-products" class="nav-link text-gray-600 hover:text-blue-500" data-page="products">商品</a>
        <a href="#" id="nav-redeem" class="nav-link text-gray-600 hover:text-blue-500" data-page="redeem">查询</a>
      </div>

      <!-- 右侧：语言切换 -->
      <div class="hidden md:flex items-center gap-1 text-sm">
        <button onclick="setLang('zh')" class="text-gray-400 hover:text-gray-600">中</button>
        <button onclick="setLang('en')" class="text-gray-400 hover:text-gray-600">En</button>
        <button onclick="setLang('ja')" class="text-gray-400 hover:text-gray-600">日</button>
        <button onclick="setLang('ko')" class="text-gray-400 hover:text-gray-600">한</button>
      </div>

      <!-- 移动端汉堡菜单按钮 -->
      <button class="md:hidden p-2" onclick="toggleMobileMenu()">
        <svg id="mobileMenuIcon" class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    <!-- 移动端展开菜单 -->
    <div id="mobileMenu" class="md:hidden bg-white border-t border-gray-100 hidden">
      <div class="px-4 py-3 space-y-2">
        <a href="#" class="nav-link block py-2 px-3 rounded-lg bg-blue-50 text-blue-500" data-page="index">首页</a>
        <a href="#" class="nav-link block py-2 px-3 rounded-lg hover:bg-gray-50 text-gray-600" data-page="products">商品</a>
        <a href="#" class="nav-link block py-2 px-3 rounded-lg hover:bg-gray-50 text-gray-600" data-page="redeem">查询</a>
        <div class="pt-3 border-t border-gray-100 flex gap-4">
          <button onclick="setLang('zh')" class="text-gray-400 hover:text-gray-600">中</button>
          <button onclick="setLang('en')" class="text-gray-400 hover:text-gray-600">En</button>
          <button onclick="setLang('ja')" class="text-gray-400 hover:text-gray-600">日</button>
          <button onclick="setLang('ko')" class="text-gray-400 hover:text-gray-600">한</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 内容区域 -->
  <div id="content-area" class="pt-14 min-h-screen"></div>

  <!-- 底部导航（移动端） -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 z-50 md:hidden">
    <div class="flex items-center justify-around h-14">
      <a href="#" class="nav-link flex flex-col items-center justify-center flex-1 h-full text-blue-500" data-page="index">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
        <span class="text-xs font-medium">首页</span>
      </a>
      <a href="#" class="nav-link flex flex-col items-center justify-center flex-1 h-full text-gray-400" data-page="products">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
        </svg>
        <span class="text-xs font-medium">商品</span>
      </a>
      <a href="#" class="nav-link flex flex-col items-center justify-center flex-1 h-full text-gray-400" data-page="redeem">
        <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <span class="text-xs font-medium">查询</span>
      </a>
    </div>
  </nav>

  <script src="../assets/js/common.js"></script>
  <script>
    // 简单的 SPA 路由系统
    const router = {
      currentPage: null,
      
      // 页面配置
      routes: {
        'index': { title: '首页', init: initIndex },
        'products': { title: '商品列表', init: initProducts },
        'product': { title: '商品详情', init: initProduct },
        'order': { title: '订单详情', init: initOrder },
        'payment': { title: '支付', init: initPayment },
        'redeem': { title: '查询卡密', init: initRedeem }
      },
      
      // 导航到指定页面
      navigate(page, params = {}) {
        const route = this.routes[page];
        if (!route) return;
        
        this.currentPage = page;
        
        // 显示加载条
        document.getElementById('loadingBar').classList.add('active');
        
        // 更新导航激活状态
        this.updateNavActive(page);
        
        // 更新浏览器历史
        let url = `/pages/app.html?page=${page}`;
        if (Object.keys(params).length > 0) {
          const paramStr = Object.entries(params)
            .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
            .join('&');
          url += '&' + paramStr;
        }
        history.pushState({ page, params }, route.title, url);
        
        // 加载页面内容
        this.loadContent(page, params);
      },
      
      // 加载页面内容
      loadContent(page, params) {
        const contentArea = document.getElementById('content-area');
        const route = this.routes[page];
        
        // 淡出动画
        contentArea.classList.remove('loaded');
        
        setTimeout(() => {
          // 清空内容
          contentArea.innerHTML = '';
          
          // 执行页面初始化函数
          if (route.init) {
            route.init(contentArea, params);
          }
          
          // 隐藏加载条
          document.getElementById('loadingBar').classList.remove('active');
          
          // 淡入动画
          contentArea.classList.add('loaded');
          
          // 更新标题
          document.title = route.title + ' - 兰雀Pro';
          
          // 滚动到顶部
          window.scrollTo(0, 0);
        }, 150);
      },
      
      // 更新导航激活状态
      updateNavActive(page) {
        document.querySelectorAll('.nav-link').forEach(link => {
          link.classList.remove('text-blue-500', 'active');
          link.classList.add('text-gray-400', 'text-gray-600');
          
          const linkPage = link.getAttribute('data-page');
          if (linkPage === page || (page === 'product' && linkPage === 'products')) {
            link.classList.remove('text-gray-400', 'text-gray-600');
            link.classList.add('text-blue-500', 'active');
          }
        });
      }
    };
    
    // 页面初始化函数
    function initIndex(container, params) {
      container.innerHTML = `
        <section class="hero bg-gradient-to-br from-blue-500 to-blue-600 text-white py-16 md:py-24">
          <div class="max-w-6xl mx-auto px-4 text-center">
            <h1 class="text-3xl md:text-5xl font-bold mb-4">安全便捷的礼品卡发卡平台</h1>
            <p class="text-lg md:text-xl text-blue-100 mb-8">支持多种支付方式，快速发货</p>
            <button onclick="router.navigate('products')" class="bg-white text-blue-600 font-medium text-lg px-8 py-4 rounded-xl hover:bg-gray-100 transition-colors">立即开始</button>
          </div>
        </section>
        
        <section class="payment-methods py-12 bg-white">
          <div class="max-w-6xl mx-auto px-4">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">支持多种支付方式</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
              <div class="card p-6 text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                </div>
                <h3 class="font-medium text-gray-800">微信支付</h3>
              </div>
              <div class="card p-6 text-center">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                </div>
                <h3 class="font-medium text-gray-800">支付宝</h3>
              </div>
              <div class="card p-6 text-center">
                <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                  </svg>
                </div>
                <h3 class="font-medium text-gray-800">USDT (TRC20)</h3>
              </div>
              <div class="card p-6 text-center">
                <div class="w-16 h-16 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                  <span class="text-2xl font-bold text-orange-600">OKX</span>
                </div>
                <h3 class="font-medium text-gray-800">OKX (TRC20)</h3>
              </div>
            </div>
          </div>
        </section>
        
        <section class="how-to-buy py-12 bg-gray-50">
          <div class="max-w-6xl mx-auto px-4">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">如何购买</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div class="text-center">
                <div class="w-12 h-12 bg-blue-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 text-xl font-bold">1</div>
                <h3 class="font-medium text-gray-800 mb-2">选择商品</h3>
                <p class="text-gray-500 text-sm">浏览我们的商品列表</p>
              </div>
              <div class="text-center">
                <div class="w-12 h-12 bg-blue-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 text-xl font-bold">2</div>
                <h3 class="font-medium text-gray-800 mb-2">完成支付</h3>
                <p class="text-gray-500 text-sm">选择您喜欢的支付方式</p>
              </div>
              <div class="text-center">
                <div class="w-12 h-12 bg-blue-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 text-xl font-bold">3</div>
                <h3 class="font-medium text-gray-800 mb-2">获取卡密</h3>
                <p class="text-gray-500 text-sm">在查询页面输入您填写的信息，即可获取您的礼品卡密</p>
              </div>
            </div>
          </div>
        </section>
        
      `;
    }
    
    function initProducts(container, params) {
      container.innerHTML = `
        <div class="max-w-6xl mx-auto px-4 py-8">
          <h1 class="text-2xl font-bold text-gray-800 mb-6">商品列表</h1>
          <!-- 分类筛选 -->
          <div id="category-tabs" class="flex flex-wrap gap-2 mb-6">
            <button class="category-tab px-4 py-2 rounded-full text-sm font-medium bg-blue-500 text-white" data-category-id="all">全部</button>
          </div>
          <!-- 商品网格 -->
          <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-center py-20 text-gray-500 col-span-full">加载中...</div>
          </div>
        </div>
      `;
      
      const lang = getCurrentLang();
      
      // 加载分类
      fetch('/api/products/categories?lang=' + lang)
        .then(r => r.json())
        .then(data => {
          const tabsContainer = document.getElementById('category-tabs');
          if (!tabsContainer) return;
          
          if (data.code === 200 && data.data && data.data.categories) {
            const categories = data.data.categories;
            categories.forEach(cat => {
              const btn = document.createElement('button');
              btn.className = 'category-tab px-4 py-2 rounded-full text-sm font-medium bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors';
              btn.setAttribute('data-category-id', cat.id);
              btn.textContent = cat.nameZh || cat.nameEn || cat.name || ('分类' + cat.id);
              tabsContainer.appendChild(btn);
            });
          }
          
          // 绑定分类点击事件
          tabsContainer.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
              // 更新激活状态
              tabsContainer.querySelectorAll('.category-tab').forEach(t => {
                t.classList.remove('bg-blue-500', 'text-white');
                t.classList.add('bg-gray-100', 'text-gray-600');
              });
              tab.classList.remove('bg-gray-100', 'text-gray-600');
              tab.classList.add('bg-blue-500', 'text-white');
              
              // 加载对应分类商品
              const categoryId = tab.getAttribute('data-category-id');
              loadProducts(categoryId, lang);
            });
          });
        })
        .catch(() => {});
      
      // 加载全部商品
      loadProducts('all', lang);
    }
    
    function loadProducts(categoryId, lang) {
      const grid = document.getElementById('products-grid');
      if (!grid) return;
      grid.innerHTML = '<div class="text-center py-20 text-gray-500 col-span-full">加载中...</div>';
      
      let url = '/api/products?lang=' + lang;
      if (categoryId && categoryId !== 'all') {
        url += '&categoryId=' + categoryId;
      }
      
      fetch(url)
        .then(r => r.json())
        .then(data => {
          if (!document.getElementById('products-grid')) return;
          const products = data.data && data.data.products ? data.data.products : (Array.isArray(data.data) ? data.data : []);
          if (data.code === 200 && products.length > 0) {
            grid.innerHTML = products.map(p => `
              <div class="card bg-white rounded-xl shadow-sm overflow-hidden cursor-pointer hover:shadow-md transition-shadow" onclick="router.navigate('product', {id: ${p.id}})">
                <img src="${p.imageUrl || '../assets/images/default-product.png'}" alt="${p.name}" class="w-full h-48 object-cover" onerror="this.src='../assets/images/default-product.png'">
                <div class="p-4">
                  <h3 class="font-medium text-gray-800 mb-2">${p.name}</h3>
                  <p class="text-blue-600 font-bold">${p.currency || 'USD'} ${p.price}</p>
                  <p class="text-gray-400 text-sm mt-1">库存: ${p.stockQuantity || 0}</p>
                </div>
              </div>
            `).join('');
          } else {
            grid.innerHTML = '<div class="text-center py-20 text-gray-500 col-span-full">暂无商品</div>';
          }
        })
        .catch(() => {
          if (!document.getElementById('products-grid')) return;
          grid.innerHTML = '<div class="text-center py-20 text-gray-500 col-span-full">加载失败</div>';
        });
    }
    
    function initProduct(container, params) {
      const productId = params.id || 1;
      const lang = getCurrentLang();
      
      container.innerHTML = `
        <div class="max-w-2xl mx-auto px-4 py-8">
          <div id="product-detail">
            <div class="text-center py-20 text-gray-500">加载中...</div>
          </div>
        </div>
      `;
      
      // 加载支付配置
      let paymentStatus = { wechat: true, alipay: true, trc20: true, okx: true };
      const paymentConfigPromise = fetch('/api/admin/payment-config/status')
        .then(r => r.json())
        .then(data => {
          if (data.code === 200) paymentStatus = data.data;
        })
        .catch(() => {});
      
      // 加载商品详情
      Promise.all([paymentConfigPromise, fetch('/api/products/' + productId + '?lang=' + lang).then(r => r.json())])
        .then(([_, data]) => {
          const detail = document.getElementById('product-detail');
          if (!detail) return;
          const p = data.data && data.data.product ? data.data.product : data.data;
          if (data.code === 200 && p) {
            const msg = getMessages();
            const stock = p.stockQuantity || p.stock || 0;
            const defaultImg = '../assets/images/default-product.png';
            
            detail.innerHTML = `
              <!-- 商品图片 -->
              <div class="bg-white rounded-xl shadow-sm overflow-hidden mb-6">
                <div class="aspect-square bg-gray-100">
                  <img src="${p.imageUrl || defaultImg}" alt="${p.name}" class="w-full h-full object-cover" onerror="this.src='${defaultImg}'">
                </div>
              </div>
              
              <!-- 商品信息和下单表单 -->
              <div class="bg-white rounded-xl shadow-sm p-6">
                <h1 class="text-xl font-bold text-gray-800 mb-2">${p.name}</h1>
                <p class="text-gray-500 mb-4">${p.description || ''}</p>
                
                <div class="flex items-center gap-4 mb-6">
                  <span class="text-red-500 font-bold text-2xl">${p.currency || 'USD'} ${p.price}</span>
                  <span class="text-gray-400 text-sm">${msg.product.stock || '库存'}: ${stock}</span>
                </div>
                
                <!-- 邮箱 -->
                <div class="mb-6">
                  <label class="block text-sm font-medium text-gray-700 mb-2">${msg.order.email || '邮箱'}</label>
                  <input type="email" id="emailInput" placeholder="${msg.order.emailPlaceholder || '请输入接收兑换码的邮箱'}" 
                    class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                </div>
                
                <!-- 查询密码 -->
                <div class="mb-6">
                  <label class="block text-sm font-medium text-gray-700 mb-2">${msg.order.queryPassword || '查询密码'}</label>
                  <input type="password" id="queryPasswordInput" placeholder="${msg.order.queryPasswordPlaceholder || '请设置查询密码（用于查询卡密）'}" 
                    class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/50">
                  <p class="text-xs text-gray-500 mt-1">${msg.order.queryPasswordTip || '支付成功后，可使用邮箱和此密码查询您的卡密'}</p>
                </div>
                
                <!-- 支付方式 -->
                <div class="mb-6">
                  <label class="block text-sm font-medium text-gray-700 mb-3">${msg.order.paymentMethod || '支付方式'}</label>
                  <div class="space-y-2" id="paymentOptions">
                    ${renderPaymentOptionsHTML(msg, paymentStatus)}
                  </div>
                </div>
                
                <!-- 立即购买按钮 -->
                <button id="createOrderBtn" onclick="createOrder(${p.id}, ${p.price}, '${p.currency || 'USD'}', ${stock})" ${stock === 0 ? 'disabled' : ''}
                  class="w-full py-3 rounded-lg font-medium transition-all ${stock === 0 ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-blue-500 text-white hover:bg-blue-600'}">
                  ${stock === 0 ? (msg.product.outOfStock || '暂时缺货') : (msg.order.createOrder || '立即购买')}
                </button>
              </div>
            `;
            
            // 保存商品信息到全局变量
            window.currentProduct = p;
            window.currentQuantity = 1;
            // 注意：selectedPayment 已在 renderPaymentOptionsHTML 中设置，不要覆盖
          }
        })
        .catch(() => {
          const detail = document.getElementById('product-detail');
          if (!detail) return;
          detail.innerHTML = '<div class="text-center py-20 text-gray-500">加载失败</div>';
        });
    }
    
    // 渲染支付方式HTML
    function renderPaymentOptionsHTML(msg, paymentStatus) {
      const methods = [
        { key: 'wechat', icon: '微', iconClass: 'bg-green-100 text-green-600', label: msg.order.wechat || '微信支付' },
        { key: 'alipay', icon: '支', iconClass: 'bg-blue-100 text-blue-600', label: msg.order.alipay || '支付宝' },
        { key: 'trc20', icon: 'U', iconClass: 'bg-purple-100 text-purple-600', label: msg.order.trc20 || 'USDT (TRC20)' },
        { key: 'okx', icon: 'O', iconClass: 'bg-orange-100 text-orange-600', label: 'OKX（TRC20）' }
      ];
      
      let html = '';
      let first = true;
      methods.forEach(method => {
        if (paymentStatus[method.key]) {
          const checked = first ? 'checked' : '';
          const borderClass = first ? 'border-blue-500 bg-blue-50' : 'border-gray-200';
          if (first) {
            window.selectedPayment = method.key;
            first = false;
          }
          html += `
            <label class="flex items-center gap-3 p-3 rounded-lg border cursor-pointer ${borderClass} hover:border-gray-300" onclick="selectPayment('${method.key}', this)">
              <input type="radio" name="payment" value="${method.key}" ${checked} class="hidden">
              <div class="w-10 h-10 rounded-full ${method.iconClass.split(' ')[0]} flex items-center justify-center">
                <span class="${method.iconClass.split(' ')[1]} font-bold text-lg">${method.icon}</span>
              </div>
              <span class="text-gray-700 font-medium">${method.label}</span>
            </label>
          `;
        }
      });
      
      // 钱包地址展示区域
      html += '<div id="walletAddressInfo" class="hidden mt-2 p-3 bg-purple-50 rounded-lg border border-purple-200">';
      html += '  <p class="text-xs text-purple-600 font-medium mb-1">收款地址</p>';
      html += '  <p id="walletAddressText" class="text-sm font-mono text-purple-800 break-all select-all">-</p>';
      html += '</div>';

    // 选择支付方式
    function selectPayment(method, labelEl) {
      window.selectedPayment = method;
      document.querySelectorAll('#paymentOptions label').forEach(el => {
        el.classList.remove('border-blue-500', 'bg-blue-50');
        el.classList.add('border-gray-200');
      });
      labelEl.classList.remove('border-gray-200');
      labelEl.classList.add('border-blue-500', 'bg-blue-50');
      
      // 显示/隐藏钱包地址
      const walletInfo = document.getElementById('walletAddressInfo');
      if (method === 'trc20') {
        walletInfo.classList.remove('hidden');
        if (!window.trc20WalletAddress) {
          // 加载 TRC20 配置获取钱包地址
          fetch('/api/admin/payment-config/trc20/public')
            .then(r => r.json())
            .then(data => {
              if (data.code === 200 && data.data && data.data.wallet_address) {
                window.trc20WalletAddress = data.data.wallet_address;
                document.getElementById('walletAddressText').textContent = data.data.wallet_address;
              } else {
                document.getElementById('walletAddressText').textContent = '未配置收款地址';
              }
            })
            .catch(() => {
              document.getElementById('walletAddressText').textContent = '加载失败';
            });
        } else {
          document.getElementById('walletAddressText').textContent = window.trc20WalletAddress;
        }
      } else if (method === 'okx') {
        walletInfo.classList.remove('hidden');
        if (!window.okxWalletAddress) {
          // 加载 OKX 配置获取钱包地址
          fetch('/api/admin/payment-config/okx/public')
            .then(r => r.json())
            .then(data => {
              if (data.code === 200 && data.data && data.data.okx_wallet_address) {
                window.okxWalletAddress = data.data.okx_wallet_address;
                document.getElementById('walletAddressText').textContent = data.data.okx_wallet_address;

              }

            .catch(() => {
              document.getElementById('walletAddressText').textContent = '加载失败';
            });
        } else {
          document.getElementById('walletAddressText').textContent = window.okxWalletAddress;
        }
      } else {
        walletInfo.classList.add('hidden');
      }
    }
    
    // 更新数量
    function updateQuantity(delta, stock) {
      const qtyEl = document.getElementById('quantity');
      if (!qtyEl) return;
      let qty = parseInt(qtyEl.textContent) + delta;
      qty = Math.max(1, Math.min(qty, stock || 99));
      qtyEl.textContent = qty;
      window.currentQuantity = qty;
    }
    
    // 创建订单
    async function createOrder(productId, price, currency, stock) {
      const email = document.getElementById('emailInput')?.value;
      const queryPassword = document.getElementById('queryPasswordInput')?.value;
      const quantity = window.currentQuantity || 1;
      
      if (!email || !email.includes('@')) {
        showToast('请填写有效的邮箱地址', 'error');
        return;
      }
      if (!queryPassword || queryPassword.length < 6) {
        showToast('查询密码至少需要6位', 'error');
        return;
      }
      
      // 禁用按钮防止重复提交
      const btn = document.querySelector('#createOrderBtn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = '创建中...';
      }
      
      try {
        const response = await fetch('/api/orders?lang=' + getCurrentLang(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            productId: productId,
            quantity: quantity,
            paymentMethod: window.selectedPayment || 'wechat',
            email: email,
            queryPassword: queryPassword
          })
        });
        
        const data = await response.json();
        console.log('创建订单响应:', data);
        if (data.code === 200 && data.data && data.data.success) {
          // 添加 createdAt 到订单数据（用于倒计时）
          const orderData = data.data;
          if (!orderData.createdAt) {
            orderData.createdAt = new Date().toISOString();
          }
          // 跳转到支付页面
          const orderStr = encodeURIComponent(JSON.stringify(orderData));
          router.navigate('payment', { order: orderStr });
        } else {
          const msg = data.message || data.error || '创建订单失败，请稍后重试';
          console.error('创建订单失败:', data);
          showToast(msg, 'error');
        }
      } catch (error) {
        console.error('创建订单失败:', error);
        showToast('网络错误，请重试', 'error');
      } finally {
        // 恢复按钮
        if (btn) {
          btn.disabled = false;
          btn.textContent = '创建订单';
        }
      }
    }
    
    // Toast 提示
    function showToast(message, type = 'info') {
      // 移除已有的 toast
      const existing = document.querySelector('.app-toast');
      if (existing) existing.remove();
      
      const toast = document.createElement('div');
      const bgColor = type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-blue-500';
      toast.className = `app-toast fixed top-4 left-1/2 -translate-x-1/2 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg z-50 text-sm font-medium`;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = 'opacity 0.3s';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

              const createdAt = new Date(data.data.createdAt).getTime();
              expireAt = createdAt + orderExpireMinutes * 60 * 1000;
              // 更新 order 对象
              order.createdAt = data.data.createdAt;
            }
          } catch (e) {
            console.error('获取订单信息失败:', e);
          }
        }
        
        startCountdown(expireAt);
        
        // 加载支付方式切换按钮
        loadPaymentSwitch(order);
      }
    }
    
    function getPaymentMethodName(method) {
      const names = {
        'wechat': '微信支付',
        'alipay': '支付宝',
        'trc20': 'USDT (TRC20)',
        'okx': 'OKX（TRC20）'
      };
      return names[method] || method || '未知支付方式';
    }
    
    function startCountdown(expireAt) {
      const countdownEl = document.getElementById('countdown');
      if (!countdownEl) return;
      
      const update = () => {
        const now = Date.now();
        const diff = expireAt - now;
        if (diff <= 0) {
          countdownEl.textContent = '00:00';
          countdownEl.classList.add('text-red-500');
          return;
        }
        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        countdownEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
      };
      
      update();
      setInterval(update, 1000);
    }
    
    // 加载支付方式切换按钮
    async function loadPaymentSwitch(order) {
      const switchContainer = document.getElementById('paymentSwitch');
      if (!switchContainer) return;
      
      try {
        const response = await fetch('/api/admin/payment-config/status');
        const data = await response.json();
        
        if (data.code !== 200) {
          switchContainer.innerHTML = '<p class="text-sm text-gray-400">加载支付方式失败</p>';
          return;
        }
        
        const status = data.data;
        const methods = [];
        
        if (status.wechat) methods.push({ key: 'wechat', name: '微信支付', icon: '💚' });
        if (status.alipay) methods.push({ key: 'alipay', name: '支付宝', icon: '💙' });
        if (status.trc20) methods.push({ key: 'trc20', name: 'USDT', icon: '💜' });
        if (status.okx) methods.push({ key: 'okx', name: 'OKX（TRC20）', icon: '🔶' });
        
        if (methods.length === 0) {
          switchContainer.innerHTML = '<p class="text-sm text-gray-400">暂无其他支付方式</p>';
          return;
        }
        
        switchContainer.innerHTML = methods.map(method => {
          const isCurrent = order.paymentMethod === method.key;
          const bgClass = isCurrent ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-700 hover:bg-gray-200';
          const disabledAttr = isCurrent ? 'disabled' : '';
          return `
            <button onclick="switchPaymentMethod('${order.orderNo}', '${method.key}')" 
              ${disabledAttr}
              class="flex flex-col items-center justify-center p-3 rounded-lg ${bgClass} transition-colors ${isCurrent ? 'cursor-default' : 'cursor-pointer'}">
              <span class="text-xl mb-1">${method.icon}</span>
              <span class="text-xs">${method.name}</span>
            </button>
          `;
        }).join('');
      } catch (error) {
        console.error('加载支付方式失败:', error);
        switchContainer.innerHTML = '<p class="text-sm text-gray-400">加载失败</p>';
      }
    }

        } else {
          // 验证失败
          loadingDiv.classList.add('hidden');
          errorDiv.classList.remove('hidden');
          errorText.textContent = data.message || '交易验证失败，请检查交易哈希是否正确';
          submitBtn.disabled = false;
          submitBtn.classList.remove('opacity-50');
        }
      } catch (error) {
        console.error('提交 TXID 失败:', error);
        loadingDiv.classList.add('hidden');
        errorDiv.classList.remove('hidden');
        errorText.textContent = '网络错误，请稍后重试';
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-50');
      }
    }
    
    // 确认支付 - 开始轮询查询支付状态
    let paymentCheckInterval = null;
    let paymentCheckCount = 0;
    let paymentSuccess = false; // 标记是否已支付成功，防止重复刷新
    const maxPaymentCheckCount = 60; // 最多查询60次（约5分钟）
    
    async function confirmPayment(orderNo) {
      const statusArea = document.getElementById('paymentStatusArea');
      const statusText = document.getElementById('paymentStatusText');
      const statusIcon = document.getElementById('paymentStatusIcon');
      const confirmBtn = document.getElementById('confirmPaymentBtn');
      
      if (!statusArea || !statusText) return;
      
      // 显示状态区域
      statusArea.classList.remove('hidden');
      statusText.textContent = '正在查询支付状态...';
      
      // 禁用按钮
      if (confirmBtn) {
        confirmBtn.disabled = true;
        confirmBtn.classList.add('opacity-50', 'cursor-not-allowed');
      }
      
      // 清除之前的轮询
      if (paymentCheckInterval) {
        clearInterval(paymentCheckInterval);
      }
      
      paymentCheckCount = 0;
      
      // 立即查询一次
      await checkPaymentStatus(orderNo, statusText, statusIcon, confirmBtn);
      
      // 开始轮询（每5秒查询一次）
      paymentCheckInterval = setInterval(async () => {
        paymentCheckCount++;
        if (paymentCheckCount >= maxPaymentCheckCount) {
          clearInterval(paymentCheckInterval);
          statusText.textContent = '查询超时，请稍后手动查询订单状态';
          if (confirmBtn) {
            confirmBtn.disabled = false;
            confirmBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            confirmBtn.innerHTML = `
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
              </svg>
              <span>重新查询</span>
            `;
          }
          return;
        }
        await checkPaymentStatus(orderNo, statusText, statusIcon, confirmBtn);
      }, 5000);
    }
    
    async function checkPaymentStatus(orderNo, statusText, statusIcon, confirmBtn) {
      // 如果已经支付成功，不再重复处理
      if (paymentSuccess) return;

      try {
        // 先调用确认支付 API
        const confirmResponse = await fetch(`/api/orders/${orderNo}/confirm-payment?lang=${getCurrentLang()}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const confirmData = await confirmResponse.json();
        
        if (confirmData.code === 200 && confirmData.data && confirmData.data.success) {
          // 标记已成功，防止重复处理
          paymentSuccess = true;
          clearInterval(paymentCheckInterval);
          
          // 支付确认成功
          statusText.textContent = '支付成功！';
          statusText.classList.add('text-green-600', 'font-medium');
          statusIcon.innerHTML = `
            <svg class="w-8 h-8 text-green-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          `;
          
          // 获取订单详情并展示卡密
          fetch(`/api/orders/${orderNo}?lang=${getCurrentLang()}`)
            .then(res => res.json())
            .then(data => {
              if (data.code === 200 && data.data) {
                showGiftCardsModal(data.data);
              } else {
                alert('支付成功！点击确定跳转到订单查询页面。');
                router.navigate('redeem');
              }
            })
            .catch(() => {
              alert('支付成功！点击确定跳转到订单查询页面。');
              router.navigate('redeem');
            });
          return;
        }
        
        // 如果确认失败，查询订单状态
        const response = await fetch(`/api/orders/${orderNo}?lang=${getCurrentLang()}`);
        const data = await response.json();
        
        if (data.code === 200 && data.data) {
          const order = data.data;
          
          if (order.status >= 2) {
            // 标记已成功，防止重复处理
            paymentSuccess = true;
            clearInterval(paymentCheckInterval);
            
            // 支付成功
            statusText.textContent = '支付成功！';
            statusText.classList.add('text-green-600', 'font-medium');
            statusIcon.innerHTML = `
              <svg class="w-8 h-8 text-green-500 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
            `;
            
            // 获取订单详情并展示卡密
            fetch(`/api/orders/${orderNo}?lang=${getCurrentLang()}`)
              .then(res => res.json())
              .then(data => {
                if (data.code === 200 && data.data) {
                  showGiftCardsModal(data.data);
                } else {
                  alert('支付成功！点击确定跳转到订单查询页面。');
                  router.navigate('redeem');
                }
              })
              .catch(() => {
                alert('支付成功！点击确定跳转到订单查询页面。');
                router.navigate('redeem');
              });
          } else if (order.status === 1) {
            // 已支付但未完成
            statusText.textContent = '支付已确认，正在处理...';
          } else {
            // 待支付
            statusText.textContent = `正在查询支付状态...（${paymentCheckCount + 1}/${maxPaymentCheckCount}）`;
          }
        }
      } catch (error) {
        console.error('查询支付状态失败:', error);
        statusText.textContent = '查询失败，正在重试...';
      }
    }
    
    // 显示卡密弹窗
    function showGiftCardsModal(order) {
      const cards = order.cards || [];
      if (cards.length === 0) {
        alert('支付成功！点击确定跳转到订单查询页面。');
        router.navigate('redeem');
        return;
      }
      
      let cardsHtml = '';
      cards.forEach((card, index) => {
        cardsHtml += `
          <div class="bg-green-50 rounded-lg p-4 mb-3">
            <div class="flex justify-between items-center mb-2">
              <span class="text-sm text-gray-500">卡密 ${index + 1}</span>
            </div>
            <div class="flex items-center gap-2">
              <code class="flex-1 bg-white px-3 py-2 rounded border font-mono text-sm break-all">${card.cardCode}</code>
              <button onclick="copyCardCode('${card.cardCode}')" class="px-3 py-2 bg-blue-500 text-white rounded-lg text-sm hover:bg-blue-600 shrink-0">复制</button>
            </div>
          </div>
        `;
      });
      
      const modalHtml = `
        <div id="giftCardsModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-[9999]">
          <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 max-h-[80vh] overflow-y-auto">
            <div class="p-6">
              <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-gray-800">支付成功</h3>
                <button onclick="closeGiftCardsModal()" class="text-gray-400 hover:text-gray-600">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                  </svg>
                </button>
              </div>
              <p class="text-green-600 font-medium mb-4">您的订单已支付成功，以下是您的卡密：</p>
              <div class="space-y-2">${cardsHtml}</div>
              <button onclick="closeGiftCardsModal()" class="w-full mt-4 py-3 bg-blue-500 text-white rounded-lg font-medium hover:bg-blue-600">
                完成
              </button>
            </div>
          </div>
        </div>
      `;
      
      document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
    
    function copyCardCode(code) {
      navigator.clipboard.writeText(code).then(() => {
        alert('卡密已复制到剪贴板');
      }).catch(() => {
        const input = document.createElement('input');
        input.value = code;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('卡密已复制到剪贴板');
      });
    }
    
    function closeGiftCardsModal() {
      const modal = document.getElementById('giftCardsModal');
      if (modal) {
        modal.remove();
      }
      router.navigate('redeem');
    }
  </script>
</body>
</html>
