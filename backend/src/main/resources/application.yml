server:
  port: 8080
  # 静态资源和API都在根路径下，不再使用 /api 前缀

spring:
  security:
    user:
      name: admin
      password: lanque@123
  application:
    name: giftcard-platform
  
  datasource:
    url: jdbc:mysql://127.0.0.1:13306/schema?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: schema
    password: B287j5KXSetm5Jmn
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: always
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

# MyBatis Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.giftcard.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT Configuration
jwt:
  secret: lanque@123
  expiration: 86400000  # 24 hours
  refresh-expiration: 604800000  # 7 days

# Payment Configuration
# 数据库表: payment_configs
payment:
  order-expire-minutes: 30

# CORS Configuration
cors:
  allowed-origins: "*"
  allowed-methods: "*"
  allowed-headers: "*"

# Logging
logging:
  level:
    com.giftcard: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
